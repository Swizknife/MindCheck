openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: MindCheck Mental Health Screening API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: screening
    description: Mental health screening sessions and results
  - name: openai
    description: OpenAI AI chat operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /screening/sessions:
    post:
      operationId: createSession
      tags: [screening]
      summary: Create a new screening session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionInput"
      responses:
        "201":
          description: Created session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
    get:
      operationId: listSessions
      tags: [screening]
      summary: List all screening sessions (admin)
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Session"

  /screening/sessions/{id}:
    get:
      operationId: getSession
      tags: [screening]
      summary: Get session with results
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session with results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionWithResults"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateSession
      tags: [screening]
      summary: Update session (save answers, finalize)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionUpdate"
      responses:
        "200":
          description: Updated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"

  /screening/sessions/{id}/submit:
    post:
      operationId: submitSession
      tags: [screening]
      summary: Submit completed screening answers and generate results
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitAnswers"
      responses:
        "200":
          description: Screening results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScreeningResult"

  /screening/sessions/{id}/report:
    post:
      operationId: generateReport
      tags: [screening]
      summary: Generate PDF report and send to admin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Report generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportResponse"

  /screening/stats:
    get:
      operationId: getScreeningStats
      tags: [screening]
      summary: Get aggregate screening statistics
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScreeningStats"

  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"

  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"

  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a text message and receive a streaming text response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiMessageInput"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    SessionInput:
      type: object
      properties:
        name:
          type: string
        age:
          type: ["integer", "null"]
        email:
          type: ["string", "null"]
      required:
        - name

    SessionUpdate:
      type: object
      properties:
        name:
          type: string
        age:
          type: ["integer", "null"]
        email:
          type: ["string", "null"]
        status:
          type: string

    Session:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        age:
          type: ["integer", "null"]
        email:
          type: ["string", "null"]
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: ["string", "null"]
          format: date-time
      required:
        - id
        - name
        - status
        - createdAt

    SessionWithResults:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        age:
          type: ["integer", "null"]
        email:
          type: ["string", "null"]
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: ["string", "null"]
          format: date-time
        results:
          type: ["object", "null"]
        conversationId:
          type: ["integer", "null"]
      required:
        - id
        - name
        - status
        - createdAt

    SubmitAnswers:
      type: object
      properties:
        answers:
          type: array
          items:
            $ref: "#/components/schemas/QuestionAnswer"
      required:
        - answers

    QuestionAnswer:
      type: object
      properties:
        questionId:
          type: string
        score:
          type: integer
      required:
        - questionId
        - score

    ScreeningResult:
      type: object
      properties:
        sessionId:
          type: integer
        overallRisk:
          type: string
        overallScore:
          type: number
        riskLevel:
          type: string
        modules:
          type: array
          items:
            $ref: "#/components/schemas/ModuleResult"
        safetyAlert:
          type: boolean
        recommendations:
          type: array
          items:
            type: string
      required:
        - sessionId
        - overallRisk
        - overallScore
        - riskLevel
        - modules
        - safetyAlert
        - recommendations

    ModuleResult:
      type: object
      properties:
        name:
          type: string
        score:
          type: number
        maxScore:
          type: number
        riskPercent:
          type: number
        riskLevel:
          type: string
      required:
        - name
        - score
        - maxScore
        - riskPercent
        - riskLevel

    ReportResponse:
      type: object
      properties:
        message:
          type: string
        reportId:
          type: string
      required:
        - message
        - reportId

    ScreeningStats:
      type: object
      properties:
        total:
          type: integer
        completed:
          type: integer
        byRiskLevel:
          type: object
          additionalProperties:
            type: integer
        topIssues:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              count:
                type: integer
            required:
              - name
              - count
        averageScore:
          type: number
      required:
        - total
        - completed
        - byRiskLevel
        - topIssues
        - averageScore

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    OpenaiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt

    OpenaiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt

    OpenaiConversationInput:
      type: object
      properties:
        title:
          type: string
      required:
        - title

    OpenaiMessageInput:
      type: object
      properties:
        content:
          type: string
        sessionId:
          type: ["integer", "null"]
      required:
        - content

    OpenaiConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/OpenaiMessage"
      required:
        - id
        - title
        - createdAt
        - messages

    OpenaiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
