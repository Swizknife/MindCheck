kind = "web"
previewPath = "/"
title = "MindCheck — Gen-Z Mental Health Screening"
version = "1.0.0"
id = "artifacts/mental-health-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18753

[services.development]
run = "pnpm --filter @workspace/mental-health-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mental-health-app", "run", "build" ]
publicDir = "artifacts/mental-health-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18753"
BASE_PATH = "/"
